name: Gerar APK MoviImovel

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar arquivos do projeto
        uses: actions/checkout@v4

      - name: Preparar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Preparar Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.7"

      - name: Gerar APK de teste
        run: gradle :app:assembleDebug --stacktrace

      - name: Renomear APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk MoviImovel-APK-Teste.apk

      - name: Criar ou atualizar Release de teste
        uses: softprops/action-gh-release@v2
        with:
          tag_name: teste-atual
          name: MoviImovel - APK de Teste Atual
          body: |
            APK atualizado automaticamente pelo GitHub Actions.
            Baixe o arquivo MoviImovel-APK-Teste.apk abaixo.
          prerelease: true
          make_latest: false
          files: |
            MoviImovel-APK-Teste.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
