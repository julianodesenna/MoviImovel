name: Gerar APK MoviImovel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar arquivos do projeto
        uses: actions/checkout@v4

      - name: Preparar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Preparar Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.7"

      - name: Baixar modelo real Depth Anything V2
        run: |
          rm -rf app/src/main/assets
          mkdir -p app/src/main/assets

          curl -fL \
            --retry 3 \
            --retry-delay 3 \
            "https://huggingface.co/qualcomm/Depth-Anything-V2/resolve/a09c7e962a6bd3b3c305c9de373e856b1f026cb1/Depth-Anything-V2.tflite?download=true" \
            -o app/src/main/assets/depth_anything_v2.tflite

          echo "=== ARQUIVO BAIXADO ==="
          ls -lh app/src/main/assets/depth_anything_v2.tflite

      - name: Confirmar que o modelo é real
        run: |
          TAMANHO=$(stat -c%s app/src/main/assets/depth_anything_v2.tflite)

          echo "Tamanho em bytes: $TAMANHO"

          if [ "$TAMANHO" -lt 80000000 ]; then
            echo "ERRO: o arquivo baixado não é o modelo real de profundidade."
            exit 1
          fi

          echo "MODELO REAL CONFIRMADO."

      - name: Gerar APK de teste
        run: gradle :app:assembleDebug --stacktrace

      - name: Renomear APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk MoviImovel-APK-Teste.apk
          ls -lh MoviImovel-APK-Teste.apk

      - name: Mostrar APK direto no Actions
        uses: actions/upload-artifact@v7
        with:
          name: MoviImovel-APK-Teste.apk
          path: MoviImovel-APK-Teste.apk
          archive: false
          if-no-files-found: error
