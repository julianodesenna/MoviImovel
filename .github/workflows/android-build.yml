name: Gerar APK MoviImovel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar arquivos do projeto
        uses: actions/checkout@v4

      - name: Preparar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Preparar Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.7"

      - name: Gerar APK de teste
        run: gradle :app:assembleDebug --stacktrace

      - name: Renomear APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk MoviImovel-APK-Teste.apk

      - name: Mostrar APK no Actions
        uses: actions/upload-artifact@v4
        with:
          name: MoviImovel-APK-Teste.apk
          path: MoviImovel-APK-Teste.apk
          compression-level: 0
          if-no-files-found: error
